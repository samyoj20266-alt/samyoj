<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Search | samyoj</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS for Free Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .map-wrapper {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        #map {
            flex: 1;
            height: 100%;
            background: #f1f5f9;
        }
        
        .search-panel {
            width: 400px;
            background: #fff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 2rem;
            overflow-y: auto;
            z-index: 10;
        }
        
        .results-list {
            margin-top: 2rem;
        }
        
        .place-card {
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .place-card:hover {
            border-color: var(--primary);
            background: #fdfdfd;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1);
        }
        
        .place-name {
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text-main);
        }
        
        .place-rating {
            color: #f59e0b;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        .place-address {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.4;
        }
        
        .map-search-bar {
            position: relative;
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .map-search-bar input {
            padding-left: 2.75rem;
        }

        .verified-badge {
            background: #dcfce7;
            color: #166534;
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        @media (max-width: 900px) {
            .map-wrapper {
                flex-direction: column;
            }
            .search-panel {
                width: 100%;
                height: 40%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="customer-dashboard.html" class="logo">samyoj</a>
            <div class="nav-links">
                <a href="customer-dashboard.html">Discover</a>
                <a href="vendor-directory.html">Find Vendors</a>
                <a href="find-on-map.html" class="active">Map Search</a>
                <a href="my-bookings.html">My Bookings</a>
                <a href="profile.html">Profile</a>
                <a href="role-select.html" class="btn btn-outline" style="padding: 0.4rem 1rem;">Logout</a>
            </div>
        </div>
    </nav>

    <div class="map-wrapper">
        <div class="search-panel">
            <h2 class="mb-4">Live Discovery 📍</h2>
            <p class="text-secondary mb-6" style="font-size: 0.875rem;">Showing verified event services near your location.</p>
            
            <div class="map-search-bar mb-6">
                <span class="search-icon">🔍</span>
                <input type="text" id="city-search" class="form-control" placeholder="Search City or Area (e.g. Mumbai)">
            </div>
            
            <div class="form-group">
                <label class="form-label">Service Category</label>
                <select id="service-type" class="form-control" onchange="performSearch()">
                    <option value="All">All Categories</option>
                    <option value="Event Management">Event Management</option>
                    <option value="Catering">Catering</option>
                    <option value="Decoration">Decoration</option>
                    <option value="Lighting & Sound">Lighting & Sound</option>
                    <option value="Photography">Photography</option>
                </select>
            </div>
            
            <button class="btn btn-primary" style="width: 100%;" onclick="performSearch()">Find Professionals</button>
            
            <div id="results" class="results-list">
                <!-- Results will appear here -->
                <p class="text-center text-muted py-8">Enter a city to explore local experts...</p>
            </div>
        </div>
        
        <div id="map"></div>
    </div>

    <!-- Leaflet JS for Free Maps -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        let map;
        let markers = [];
        let currentResults = [];

        function initMap() {
            // Default center is Mumbai
            map = L.map('map').setView([19.0760, 72.8777], 12);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Pre-load current city if available
            const city = localStorage.getItem('lastSearchedCity') || "Mumbai";
            document.getElementById('city-search').value = city;
            
            if (city) performSearch();
        }

        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }

        async function performSearch() {
            const citySearch = document.getElementById('city-search').value;
            const category = document.getElementById('service-type').value;
            const resultsDiv = document.getElementById('results');
            
            if (!citySearch) {
                alert("Please enter a city or area name.");
                return;
            }

            resultsDiv.innerHTML = '<div class="text-center"><p>Scanning location...</p></div>';
            clearMarkers();

            try {
                // Free Geocoding Search
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(citySearch)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    
                    map.setView([lat, lon], 12);

                    // Fetch real verified vendors from the API
                    const vendorRes = await fetch('/api/vendors');
                    const vendorData = await vendorRes.json();
                    
                    if (vendorData.vendors) {
                        let filteredVendors = vendorData.vendors.filter(v => {
                            // If user searches "Hyderabad" we want vendors exactly matching or substring matching
                            const matchCity = !v.location || v.location.toLowerCase().includes(citySearch.toLowerCase()) || citySearch.toLowerCase().includes(v.location.toLowerCase());
                            const matchCat = category === 'All' || v.category === category;
                            return matchCity && matchCat;
                        });
                        
                        displayVendors(filteredVendors, lat, lon);
                    } else {
                        resultsDiv.innerHTML = '<p class="text-center text-muted">No vendors available.</p>';
                    }

                } else {
                    resultsDiv.innerHTML = '<p class="text-center text-muted">Location not found. Try a bigger city name.</p>';
                }
            } catch (err) {
                console.error(err);
                resultsDiv.innerHTML = '<p class="text-center text-muted">Network error while fetching map data.</p>';
            }
        }

        function displayVendors(vendors, centerLat, centerLon) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            currentResults = [];

            if (vendors.length === 0) {
                resultsDiv.innerHTML = '<p class="text-center text-muted py-8">No verified professionals found matching your criteria in this area.</p>';
                return;
            }

            vendors.forEach((vendor, index) => {
                // If the vendor has set their exact GPS location, use it. Otherwise, offset slightly so markers don't overlap completely.
                const dLat = (Math.random() - 0.5) * 0.06;
                const dLon = (Math.random() - 0.5) * 0.06;
                
                const result = {
                    name: vendor.businessName || vendor.name || 'Unnamed Vendor',
                    category: vendor.category || 'General',
                    lat: vendor.lat ? parseFloat(vendor.lat) : centerLat + dLat,
                    lon: vendor.lon ? parseFloat(vendor.lon) : centerLon + dLon,
                    address: vendor.location || 'Unknown Location',
                    rating: vendor.rating || 'New',
                    reviews: vendor.reviewCount || 0,
                    contact: vendor.email || vendor.phone || '',
                    id: index
                };

                currentResults.push(result);
                addMarker(result);
                addPlaceCard(result);
            });
        }

        function addMarker(place) {
            const marker = L.marker([place.lat, place.lon]).addTo(map);
            
            marker.bindPopup(`
                <div style="padding: 10px;">
                    <strong>${place.name}</strong><br>
                    <span style="font-size: 0.8rem; color: #666;">${place.category}</span><br>
                    ${place.address}<br>
                    <span style="color: #f59e0b">★ ${place.rating}</span> (${place.reviews} reviews)
                </div>
            `);
            
            markers.push(marker);
        }

        function addPlaceCard(place) {
            const resultsDiv = document.getElementById('results');
            const card = document.createElement('div');
            card.className = 'place-card';
            
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: start;">
                    <div class="place-name">${place.name}</div>
                    <span class="verified-badge">Verified</span>
                </div>
                <div style="font-size: 0.75rem; color: var(--primary); font-weight: 600; margin-bottom: 0.25rem; text-transform: uppercase;">${place.category}</div>
                <div class="place-rating">★ ${place.rating} (${place.reviews} reviews)</div>
                <div class="place-address">📍 ${place.address}</div>
                <div style="margin-top: 0.75rem;">
                    <a href="event-services.html?vendor=${encodeURIComponent(place.contact)}" class="btn btn-outline" style="padding: 0.35rem 0.5rem; font-size: 0.8125rem; width: 100%; text-align: center; display: block; text-decoration: none;">View Profile & Book</a>
                </div>
            `;
            
            card.onclick = (e) => {
                if (e.target.tagName !== 'A') {
                    map.setView([place.lat, place.lon], 14);
                    markers[place.id].openPopup();
                }
            };

            resultsDiv.appendChild(card);
        }

        // Initialize on load
        window.onload = initMap;
        
        // Enter key to search
        document.getElementById('city-search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
