<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>samyoj | What do you want to do?</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .role-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-body);
            position: relative;
            overflow: hidden;
        }
        /* Ambient purple glow */
        .role-wrapper::before {
            content: '';
            position: absolute;
            top: -200px; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .role-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 0.75rem;
            text-align: center;
            letter-spacing: -0.03em;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .role-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            text-align: center;
            margin-bottom: 3rem;
        }

        .cards-row {
            display: flex;
            gap: 2rem;
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .role-card {
            flex: 1;
            background: var(--bg-card);
            border-radius: var(--radius-2xl);
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .role-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--gradient-glow);
            pointer-events: none;
            border-radius: inherit;
        }
        .role-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-glow);
            border-color: var(--primary);
        }
        .role-card.vendor:hover { border-color: var(--cyan); box-shadow: 0 0 60px rgba(34, 211, 238, 0.12); }

        .role-icon {
            width: 100px; height: 100px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            transition: transform 0.3s;
        }
        .role-card:hover .role-icon { transform: scale(1.08); }
        .role-card.vendor .role-icon { background: linear-gradient(135deg, var(--cyan), #0891b2); }

        .svg-icon { width: 48px; height: 48px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .role-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.625rem; letter-spacing: -0.02em; }
        .role-desc { color: var(--text-muted); font-size: 0.9375rem; margin-bottom: 2rem; }

        .role-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: #fff;
            background: var(--primary);
            box-shadow: 0 1px 3px rgba(168, 85, 247, 0.4);
        }
        .role-cta:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .role-card.vendor .role-cta {
            background: var(--cyan-dark);
            box-shadow: 0 1px 3px rgba(34, 211, 238, 0.4);
        }
        .role-card.vendor .role-cta:hover { background: #0891b2; }

        .footer-text {
            position: absolute;
            bottom: 2rem;
            font-size: 0.75rem;
            color: var(--text-faint);
        }

        @media (max-width: 768px) {
            .cards-row { flex-direction: column; }
            .role-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="role-wrapper">
        <h1 class="role-title">samyoj</h1>
        <p class="role-subtitle">Your premium event management platform</p>

        <div class="cards-row">
            <div class="role-card" onclick="window.location.href='customer-login.html'">
                <div class="role-icon">
                    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <h2 class="role-name">Customer</h2>
                <p class="role-desc">Book Event Services</p>
                <a href="customer-login.html" class="role-cta">Continue as Customer →</a>
            </div>

            <div class="role-card vendor" onclick="window.location.href='vendor-login.html'">
                <div class="role-icon">
                    <svg class="svg-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                </div>
                <h2 class="role-name">Vendor</h2>
                <p class="role-desc">Provide Event Services</p>
                <a href="vendor-login.html" class="role-cta">Continue as Vendor →</a>
            </div>
        </div>

        <span class="footer-text">© 2026 samyoj. All rights reserved.</span>
    </div>

    <script>
        /* Auto-apply stored theme */
        (function() {
            const stored = localStorage.getItem('samyoj-theme');
            if (stored === 'dark') document.documentElement.classList.add('dark');
            else if (stored === 'light') document.documentElement.classList.remove('dark');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
        })();
    </script>
</body>
</html>
